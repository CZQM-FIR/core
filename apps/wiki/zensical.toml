[project]
site_name = "CZQM Wiki"
site_description = "Welcome to the Moncton / Gander FIR Wiki!"
site_author = "CZQM FIR"
site_url = "https://wiki.czqm.ca"
copyright = """
Copyright &copy; 2026 CZQM FIR. For flight simulation use only.
"""
nav = [
  { "Welcome to CZQM Wiki" = "index.md" },
  { "Software Guides" = [
    "software/index.md",
    "software/vacs.md"
    ]}
]
#extra_css = ["stylesheets/extra.css"]
#extra_javascript = ["javascripts/extra.js"]

repo_url = "https://github.com/czqm-fir/core"
edit_uri = "edit/main/apps/wiki/docs/"

[project.theme]
#variant = "classic"
#custom_dir = "overrides"
favicon = "images/favicon.ico"
logo = "images/CZQM.png"
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    # "header.autohide",
    # "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    #"navigation.prune",
    # "navigation.sections",
    #"navigation.tabs",
    #"navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    # "toc.follow",
    #"toc.integrate",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

#[project.theme.font]
#text = "Inter"
#code = "Jetbrains Mono"

#[project.theme.icon]
#logo = "lucide/smile"
#repo = "lucide/smile"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/czqm-fir/core"
name = "CZQM GitHub"

[[project.extra.social]]
icon = "lucide/link"
link = "https://czqm.ca"
name = "Main Website"

[[project.extra.social]]
icon = "lucide/school"
link = "https://vector.czqm.ca"
name = "CZQM Vector"

[project.extra.status]
new = "Recently updated"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.abbr]
[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/glossary.md"]

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.blocks.caption]